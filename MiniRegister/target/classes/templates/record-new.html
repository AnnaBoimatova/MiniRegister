<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MiniRegister — новая бронь переговорной</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; }
        input[type=text], textarea, select { width: 500px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
        .error { color: red; font-size: 0.9em; }
        button { padding: 8px 18px; background: #007bff; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        a { margin-left: 10px; }
    </style>
</head>
<body>
<h1>Забронировать переговорную</h1>

<form th:action="@{/records}" th:object="${record}" method="post">
    <div class="form-group">
        <label>Название брони (обязательно):</label>
        <input type="text" th:field="*{title}" size="60"/>
        <div class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
    </div>

    <div class="form-group">
        <label>Комментарий:</label>
        <textarea th:field="*{description}" cols="60" rows="5"></textarea>
    </div>

    <div class="form-group">
        <label>Статус:</label>
        <select th:field="*{status}">
            <option th:each="s : ${statuses}"
                    th:value="${s}"
                    th:text="${s}">
            </option>
        </select>
    </div>

    <div style="margin-top: 16px;">
        <button type="submit">Сохранить</button>
        <a href="/records">Отмена</a>
    </div>
</form>

</body>
</html>
