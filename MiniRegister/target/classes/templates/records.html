<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MiniRegister — список броней переговорных</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 12px; }
        th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
        th { background-color: #f0f0f0; }
        .btn       { display: inline-block; padding: 5px 12px; color: #fff; text-decoration: none; border-radius: 4px; border: none; cursor: pointer; font-size: 13px; }
        .btn-blue   { background: #007bff; }
        .btn-green  { background: #28a745; }
        .btn-yellow { background: #fd7e14; }
        .btn-red    { background: #dc3545; }
        .btn-row   { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
        .csv-section { margin-top: 20px; padding: 12px; background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 4px; }
        .csv-section h3 { margin: 0 0 10px; font-size: 15px; }
        .error { color: red; margin-top: 8px; }
        .info  { color: green; margin-top: 8px; }
    </style>
</head>
<body>
<h1>MiniRegister — Бронь переговорной (B-records)</h1>

<!-- Flash-сообщения -->
<div class="error" th:if="${error}" th:text="${error}"></div>
<div class="info"  th:if="${info}"  th:text="${info}"></div>

<!-- Кнопка создания -->
<div class="btn-row">
    <a class="btn btn-blue" href="/records/new">+ Создать новую бронь</a>
</div>

<!-- Таблица броней -->
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Название брони</th>
        <th>Комментарий</th>
        <th>Статус</th>
        <th>Создано</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="r : ${records}">
        <td th:text="${r.id}">1</td>
        <td th:text="${r.title}">title</td>
        <td th:text="${r.description}">description</td>
        <td th:text="${r.status}">NEW</td>
        <td th:text="${r.createdAt}">2026-01-01T12:00</td>
        <td>
            <!-- GET /records/{id} — просмотр -->
            <a class="btn btn-blue" th:href="@{/records/{id}(id=${r.id})}">Просмотр</a>

            <!-- GET /records/{id}/edit — редактировать -->
            <a class="btn btn-yellow" th:href="@{/records/{id}/edit(id=${r.id})}">Редактировать</a>

            <!-- DELETE через POST /records/{id}/delete -->
            <form th:action="@{/records/{id}/delete(id=${r.id})}" method="post"
                  style="display:inline"
                  onsubmit="return confirm('Удалить бронь #' + /*[[${r.id}]]*/ '?')">
                <button type="submit" class="btn btn-red">Удалить</button>
            </form>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(records)}">
        <td colspan="6" style="text-align:center; color:#888;">Броней пока нет</td>
    </tr>
    </tbody>
</table>

<!-- Секция CSV -->
<div class="csv-section">
    <h3>Экспорт / Импорт CSV</h3>

    <div class="btn-row">
        <!-- Экспорт: форма POST /records/export -->
        <form method="post" th:action="@{/records/export}">
            <button type="submit" class="btn btn-green">⬇ Экспорт CSV</button>
        </form>

        <!-- Импорт: форма с загрузкой файла POST /records/import -->
        <form method="post" th:action="@{/records/import}" enctype="multipart/form-data"
              style="display:flex; gap:8px; align-items:center;">
            <input type="file" name="file" accept=".csv" required/>
            <button type="submit" class="btn btn-green">⬆ Импорт CSV</button>
        </form>
    </div>
</div>

<hr/>
<p style="color:#888; font-size:13px;">
    <a href="/swagger-ui.html">Swagger UI</a> &nbsp;|&nbsp;
    <a href="/h2-console">H2 Console</a>
</p>

</body>
</html>
