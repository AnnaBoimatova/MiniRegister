<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактировать бронь</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; }
        input[type=text], textarea, select { width: 500px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
        .error { color: red; font-size: 0.9em; }
        .btn      { display: inline-block; padding: 7px 16px; color: #fff; text-decoration: none; border-radius: 4px; border: none; cursor: pointer; font-size: 14px; margin-right: 6px; }
        .btn-blue { background: #007bff; }
        .btn-grey { background: #6c757d; }
    </style>
</head>
<body>
<h2>Редактировать бронь #<span th:text="${record.id}"></span></h2>

<form th:action="@{/records/{id}/edit(id=${record.id})}" th:object="${record}" method="post">

    <div class="form-group">
        <label>Название брони (обязательно):</label>
        <input type="text" th:field="*{title}" size="60"/>
        <div class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
    </div>

    <div class="form-group">
        <label>Комментарий:</label>
        <textarea th:field="*{description}" cols="60" rows="4"></textarea>
    </div>

    <div class="form-group">
        <label>Статус:</label>
        <select th:field="*{status}">
            <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
        </select>
    </div>

    <div style="margin-top: 16px;">
        <button type="submit" class="btn btn-blue">Сохранить</button>
        <a class="btn btn-grey" th:href="@{/records/{id}(id=${record.id})}">Отмена</a>
    </div>
</form>
</body>
</html>
